{% extends 'plaintes/base.html' %}
{% block auth_content %}
<div class="min-vh-100 d-flex align-items-center justify-content-center" style="background: linear-gradient(135deg, #1e3a5f 0%, #0f2340 100%);">
  <div class="card p-4" style="width: 100%; max-width: 420px;">
    <div class="text-center mb-4">
      <i class="bi bi-shield-check text-primary" style="font-size: 3rem;"></i>
      <h3 class="fw-bold mt-2">PlaintesApp</h3>
      <p class="text-muted">Système de Gestion des Plaintes</p>
    </div>
    <form method="post">
      {% csrf_token %}
      {% for field in form %}
      <div class="mb-3">
        <label class="form-label fw-semibold">{{ field.label }}</label>
        <input type="{{ field.field.widget.input_type }}" name="{{ field.html_name }}"
          class="form-control form-control-lg {% if field.errors %}is-invalid{% endif %}"
          placeholder="{{ field.label }}" {% if field.value %}value="{{ field.value }}"{% endif %}>
        {% for error in field.errors %}
        <div class="invalid-feedback">{{ error }}</div>
        {% endfor %}
      </div>
      {% endfor %}
      <button type="submit" class="btn btn-primary w-100 btn-lg mt-2">
        <i class="bi bi-box-arrow-in-right me-2"></i>Se connecter
      </button>
    </form>
    <hr>
    <div class="text-center">
      <p class="text-muted mb-0">Pas encore de compte ?
        <a href="{% url 'inscription' %}" class="fw-semibold">S'inscrire</a>
      </p>
    </div>
  </div>
</div>
{% endblock %}
